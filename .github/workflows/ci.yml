name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      build_installer:
        description: "Build and upload the Windows installer artifact"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  checks:
    name: Tests, lint, and frontend build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Run frontend unit tests
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri\Cargo.toml

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri\Cargo.toml -- -D warnings

  windows-installer:
    name: Windows installer artifact
    runs-on: windows-latest
    needs: checks
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_installer == 'true' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri installer
        run: npm run tauri:build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: btc-lottery-pet-windows-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
